# Nginx Configuration for KEPROBA Production Server
# Place this file at: /etc/nginx/sites-available/keproba
# Then create symlink: sudo ln -s /etc/nginx/sites-available/keproba /etc/nginx/sites-enabled/

# Rate limiting
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# Upstream servers
upstream keproba_api {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream keproba_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Configuration (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.arcgis.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://js.arcgis.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://js.arcgis.com; img-src 'self' data: https: blob:; connect-src 'self' https://services.arcgis.com https://www.arcgis.com wss:; frame-src 'self' https://www.google.com;" always;

    # Logging
    access_log /var/log/nginx/keproba_access.log;
    error_log /var/log/nginx/keproba_error.log;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Client settings
    client_max_body_size 10M;
    client_body_timeout 60s;
    client_header_timeout 60s;

    # API Routes with rate limiting
    location /api/ {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        
        # Special rate limiting for auth endpoints
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://keproba_api;
            include /etc/nginx/proxy_params;
        }
        
        location /api/auth/register {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://keproba_api;
            include /etc/nginx/proxy_params;
        }
        
        # Default API proxy
        proxy_pass http://keproba_api;
        include /etc/nginx/proxy_params;
        
        # API-specific headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Static assets with long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://keproba_frontend;
        include /etc/nginx/proxy_params;
        
        # Cache static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        
        # Optimize for static content
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
    }

    # Next.js specific routes
    location /_next/ {
        proxy_pass http://keproba_frontend;
        include /etc/nginx/proxy_params;
        
        # Cache Next.js assets
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint (bypass rate limiting)
    location /api/health {
        proxy_pass http://keproba_api;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # WebSocket support for development
    location /socket.io/ {
        proxy_pass http://keproba_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main application (Next.js frontend)
    location / {
        proxy_pass http://keproba_frontend;
        include /etc/nginx/proxy_params;
        
        # Next.js specific headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        
        # Support for Server-Sent Events
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Security: Block access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|log|sql)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Custom error pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /var/www/html;
    }
}

# Additional server block for API-only subdomain (optional)
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # SSL Configuration (same as main domain)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # API-only configuration
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://keproba_api;
        include /etc/nginx/proxy_params;
    }
}